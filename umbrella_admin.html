<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGMS - 우산관리</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="umbrella_admin.js"></script>

</head>

<body>

<div class="container">

<a href="index.html" class="backLink">← 처음으로</a>

<h1>우산관리</h1>

<p class="madeBy">
<span>Made by 서울미고 함석민</span>
</p>

<p>우산 대여 및 반납 관리</p>

<div class="card">

<label><b>담당자</b></label>

<select id="managerSelect">

<option value="">담당자 선택</option>

<option>박나은</option>
<option>백승주</option>
<option>이윤빈</option>

</select>

</div>

<div class="countBox">

<h3>우산 현황</h3>

<div id="umbrellaGrid" class="umbrellaGrid">

</div>

</div>

<!-- 대여 모달 -->

<div id="rentModal" class="modal hidden">

<div class="modalCard">

<h3 id="rentTitle"></h3>

<input
id="studentId"
placeholder="학번 입력">

<input
id="studentName"
placeholder="이름">

<div class="termsBox">
📋 대여 전 확인사항<br>
• 3일 이상 연체 시 <b>1개월간 대여가 제한</b>됩니다.<br>
• 분실 시 <b>벌금 5,000원</b>이 부과됩니다.<br>
• 반납할 때 우산 <b>손잡이에 적힌 번호</b>를 꼭 확인하고, 빌린 그 우산을 반납해주세요.
</div>

<label style="font-size:13px;color:#666;">서명 (위 내용에 동의합니다)</label>

<canvas id="rentSignaturePad" width="300" height="120" style="border:1px solid #ddd;border-radius:12px;width:100%;touch-action:none;background:white;"></canvas>

<button id="clearRentSignature" style="background:#8e8e93;margin-top:8px;">서명 지우기</button>

<div class="modalButtons">

<button id="rentBtn">
대여
</button>

<button id="closeRent">
취소
</button>

</div>

</div>

</div>

<!-- 반납 모달 -->

<div id="returnModal" class="modal hidden">

<div class="modalCard">

<h3 id="returnTitle"></h3>

<p id="returnInfo"></p>

<div class="modalButtons">

<button id="returnBtn">
반납
</button>

<button id="lostBtn">
분실
</button>

<button id="closeReturn">
취소
</button>

</div>

</div>

</div>

<div class="countBox">

<h3>3일 이상 미반납</h3>

<div id="overdueList">

없음

</div>

</div>

<a href="umbrella_records.html" class="backLink">📋 대여 이력 전체 보기</a>

</div>

</body>
</html>
