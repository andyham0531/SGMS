<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGMS - 우산 대여/반납</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="umbrella_check.js"></script>

</head>

<body>

<div class="container">

<h1>우산 대여 · 반납</h1>

<div class="modeSwitch">
<button id="modeRentBtn" class="modeBtn active">대여하기</button>
<button id="modeReturnBtn" class="modeBtn">반납하기</button>
</div>

<!-- ===== 대여 플로우 ===== -->
<div id="rentFlow">

<div class="card">
<input id="rentStudentId" placeholder="학번 입력" inputmode="numeric">
<input id="rentStudentName" placeholder="이름 입력">
<label class="smallLabel">대여할 우산 번호</label>
<select id="rentUmbrellaSelect">
<option value="">우산 번호 선택</option>
</select>
</div>

<div id="rentStep2" class="countBox hidden">
<h3>1. 담당자에게 문자 보내기</h3>
<p id="rentManagerInfo" class="managerInfo"></p>
<textarea id="rentMessageBox" class="msgBox" readonly rows="2"></textarea>
<button id="rentCopyBtn">메시지 복사하기</button>
<a id="rentSmsLink" href="#" class="smsBtn">📱 문자 앱 열기</a>
</div>

<div id="rentStep3" class="countBox hidden">
<h3>2. 약관 확인 및 서명</h3>
<div class="termsBox">
⚠️ <b>우산 분실은 어떠한 경우에도 용납되지 않습니다.</b><br>
• 3일 이상 연체 시 <b>1개월간 대여가 제한</b>됩니다.<br>
• 분실 시 <b>벌금 5,000원</b>이 부과됩니다.<br>
• 반납할 때 우산 <b>손잡이에 적힌 번호</b>를 꼭 확인하고, 빌린 그 우산을 반납해주세요.
</div>
<label class="smallLabel">서명 (위 내용에 동의합니다)</label>
<canvas id="rentSignaturePad" width="300" height="120" class="sigCanvas"></canvas>
<button id="clearRentSignature" class="grayBtn">서명 지우기</button>
<button id="confirmRentBtn" class="topGapBtn">대여 완료</button>
</div>

</div>

<!-- ===== 반납 플로우 ===== -->
<div id="returnFlow" class="hidden">

<div class="card">
<input id="returnStudentId" placeholder="학번 입력" inputmode="numeric">
<input id="returnStudentName" placeholder="이름 입력">
<button id="findReturnBtn">조회</button>
</div>

<div id="returnStep2" class="countBox hidden">
<h3 id="returnFoundTitle"></h3>
<p id="returnManagerInfo" class="managerInfo"></p>
<textarea id="returnMessageBox" class="msgBox" readonly rows="2"></textarea>
<button id="returnCopyBtn">메시지 복사하기</button>
<a id="returnSmsLink" href="#" class="smsBtn">📱 문자 앱 열기</a>
</div>

<div id="returnStep3" class="countBox hidden">
<h3>반납 사진 첨부</h3>
<input type="file" id="returnPhotoInput" accept="image/*" capture="environment">
<button id="sendPhotoBtn" class="topGapBtn">사진 담당자에게 보내기</button>
</div>

<div id="returnStep4" class="hidden">
<button id="finalReturnBtn">반납 완료</button>
</div>

<p id="returnBanMsg" class="warning hidden"></p>

</div>

</div>

</body>

</html>
