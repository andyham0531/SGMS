<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGMS - 우산 조회</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="umbrella_check.js"></script>

</head>

<body>

<div class="container">

<a href="index.html" class="backLink">← 처음으로</a>

<h1>우산 조회</h1>
<p>학번을 입력하면 대여 현황을 볼 수 있어요</p>

<div class="card">

<input
id="studentId"
placeholder="학번 입력"
inputmode="numeric">

<button id="checkBtn">
조회
</button>

</div>

<div id="resultBox" class="countBox hidden">

<h3 id="resultTitle"></h3>

<div class="resultRow">
<span class="resultLabel">우산 번호</span>
<span id="resultNumber" class="resultValue"></span>
</div>

<div class="resultRow">
<span class="resultLabel">대여일</span>
<span id="resultDate" class="resultValue"></span>
</div>

<div class="resultRow">
<span class="resultLabel">경과일</span>
<span id="resultDays" class="resultValue"></span>
</div>

</div>

</div>

</body>

</html>
