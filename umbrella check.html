<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다원 우산대여 조회</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Malgun Gothic', sans-serif;
    background: linear-gradient(180deg, #dceafc 0%, #f4f8fd 100%);
    margin: 0;
    padding: 24px 16px;
    color: #1b2a4a;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 4px;
  }
  .sub {
    text-align: center;
    color: #5a6b8c;
    font-size: 13px;
    margin-bottom: 28px;
  }
  .search-box {
    background: white;
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    max-width: 400px;
    margin: 0 auto 20px auto;
  }
  .search-box label { font-size: 13px; color: #556; }
  .search-box input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-top: 6px;
    font-size: 15px;
  }
  .search-box button {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #3b5998;
    color: white;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
  }
  .result-card {
    max-width: 400px;
    margin: 0 auto;
    background: white;
    border-radius: 14px;
    padding: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    display: none;
  }
  .result-card.show { display: block; }
  .result-card.overdue { border: 2px solid #e05a5a; }
  .row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 14px;
  }
  .row:last-child { border-bottom: none; }
  .row .label { color: #778; }
  .row .value { font-weight: bold; }
  .warning {
    margin-top: 12px;
    background: #fff0f0;
    color: #c62828;
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    text-align: center;
  }
  .empty-msg {
    text-align: center;
    color: #889;
    font-size: 14px;
    margin-top: 20px;
  }
</style>
</head>
<body>

<h1>☂️ 다원 우산대여 조회</h1>
<div class="sub">본인의 우산 대여 현황을 확인하세요</div>

<div class="search-box">
  <label>학번</label>
  <input type="text" id="studentIdInput" placeholder="예: 10101" autocomplete="off">
  <button onclick="checkStatus()">조회하기</button>
</div>

<div class="result-card" id="resultCard"></div>
<div class="empty-msg" id="emptyMsg"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="umbrella_check.js"></script>
</body>
</html>
