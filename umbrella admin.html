<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGMS - 우산관리</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<a href="index.html" class="backLink">← 처음으로</a>

<h1>우산관리</h1>

<p>우산 대여 및 반납 관리</p>
<div class="manager-select">
  <button data-name="박나은">박나은</button>
  <button data-name="백승주">백승주</button>
  <button data-name="이윤빈">이윤빈</button>
</div>

<div class="overdue-box" id="overdueBox">
  <h2>⚠️ 미납 3일 이상 경과</h2>
  <div id="overdueList"></div>
</div>

<div class="grid" id="grid"></div>

<!-- 대여 모달 -->
<div class="modal-bg" id="rentModalBg">
  <div class="modal">
    <span class="close-x" onclick="closeModal('rentModalBg')">×</span>
    <h3 id="rentModalTitle">우산 대여</h3>
    <label>학번</label>
    <input type="text" id="rentStudentId" placeholder="예: 10101" autocomplete="off">
    <div class="autocomplete-list" id="rentAutocomplete"></div>
    <label>대여자 이름</label>
    <input type="text" id="rentName" placeholder="이름 자동입력 또는 직접입력">
    <div class="modal-btns">
      <button class="btn-gray" onclick="closeModal('rentModalBg')">취소</button>
      <button class="btn-primary" onclick="submitRent()">대여 처리</button>
    </div>
  </div>
</div>

<!-- 반납/분실 모달 -->
>반납 사진 촬영/첨부</label>
    <input type="file" id="returnPhoto" accept="image/*" capture="environment">
    <img id="photoPreview" class="photo-preview">
    <div class="modal-btns">
      <button class="btn-danger" onclick="submitLost()">분실 처리</button>
      <button class="btn-primary" onclick="submitReturn()">반납 완료</button>
    </div>
  </div>
</div>

<script type="module" src="umbrella_admin.js"></script>

</div>

</body>
</html>
